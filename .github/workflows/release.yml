name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        id: verify
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: npm run release:check

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.verify.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.verify.outputs.version }}
          files: |
            main.js
            manifest.json
            styles.css
            versions.json
